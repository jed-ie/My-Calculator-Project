<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="/style.css">   
    <title>My Calculator</title>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center">
    <!-- Main calculator container -->
    <div class="container w-[310px] max-w-[95vw] bg-black rounded-[3rem] p-6 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.8)]">
        
        <!-- calculator display -->
        <div id="display" class="flex flex-col justify-end items-end h-35 mb-6 ">

            <!-- results display -->
            <div class="text-white text-5xl break-all">
                89
            </div>
        </div>

        <!-- Buttons container -->
         <div class="buttons grid grid-cols-4 gap-1 pb-4 text-white">
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#5a5a5a] flex items-center justify-center">AC</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#5a5a5a] flex items-center justify-center">+/-</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#5a5a5a] flex items-center justify-center">%</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#ff9200] flex items-center justify-center">÷</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">7</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">8</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">9</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#ff9200] flex items-center justify-center">×</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">4</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">5</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">6</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#ff9200] flex items-center justify-center">-</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">1</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">2</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">3</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#ff9200] flex items-center justify-center">+</button>
            <button class="calc-btn w-32 h-15 col-span-2  rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">0</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#2f2f2f] flex items-center justify-center">.</button>
            <button class="calc-btn w-15 h-15 rounded-full text-2xl bg-[#ff9200] flex items-center justify-center">=</button>
         </div>
    </div>
    <script src="/index.js"></script>
</body>
</html>>
